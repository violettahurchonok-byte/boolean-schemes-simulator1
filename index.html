<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор логічних схем</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>
<body>
  <header>
    <h1>Симулятор логічних схем</h1>
  </header>

  <main>
    <div id="controls">
      <div class="input-group">
        <input type="text" id="booleanInput" placeholder="Формула з'явиться тут..." readonly>
        <button onclick="clearInput()" title="Очистити поле">✕</button>
      </div>

      <div class="button-grid">
        <fieldset>
          <legend>Змінні</legend>
          <button onclick="insertSymbol('x')">X</button>
          <button onclick="insertSymbol('y')">Y</button>
          <button onclick="insertSymbol('z')">Z</button>
        </fieldset>

        <fieldset>
          <legend>Операції</legend>
          <button onclick="insertSymbol(' and ')" title="Логічне І">І</button>
          <button onclick="insertSymbol(' or ')" title="Логічне АБО">АБО</button>
          <button onclick="insertSymbol('not ')" title="Логічне НЕ">НЕ</button>
          <button onclick="insertSymbol(' xor ')" title="Виключне АБО">⊕</button>
        </fieldset>

        <fieldset>
          <legend>Символи</legend>
          <button onclick="insertSymbol('(')">(</button>
          <button onclick="insertSymbol(')')">)</button>
        </fieldset>
      </div>

      <div class="actions">
        <button class="btn-build" onclick="buildScheme()">Побудувати схему</button>
        <button class="btn-run" onclick="runSimulation()">Запустити імпульс</button>
      </div>
    </div>

    <div id="workspace">
      <p class="placeholder-text">Тут з'явиться ваша схема...</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
